name: Dishd

options:
  bundleIdPrefix: com.dishd
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTS_MACCATALYST: NO
    ENABLE_PREVIEWS: YES
    SWIFT_STRICT_CONCURRENCY: complete

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: DishMatch/Config/Debug.xcconfig
  Release: DishMatch/Config/Release.xcconfig

targets:
  DishMatch:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: DishMatch
        excludes:
          - Config/Debug.xcconfig
          - Config/Release.xcconfig
    resources:
      - path: DishMatch/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dishd.app
        INFOPLIST_FILE: DishMatch/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: Nuke
        product: Nuke
    scheme:
      testTargets: []

  # DishMatchMessages: requires paid Apple Developer account (App Groups + Sign in with Apple).
  # All extension source lives in DishMatchMessages/. To enable:
  #   1. Get a paid Apple Developer membership
  #   2. Register group.com.dishd.app as an App Group in the portal
  #   3. Enable Sign in with Apple for com.dishd.app
  #   4. Uncomment the block below and run `xcodegen generate`
  #
  # DishMatchMessages:
  #   type: app-extension
  #   platform: iOS
  #   deploymentTarget: "16.0"
